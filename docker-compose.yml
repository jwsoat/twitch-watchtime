services:
  watch-api:
    build: ./api
    container_name: twitch-watch-api
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_PATH=/data/watchtime.db
      - HEARTBEAT_INTERVAL_SECONDS=10
      - TZ=Pacific/Auckland
    volumes:
      - ./api/data:/data
    ports:
      - "8765:8000"
